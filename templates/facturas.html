{% extends "base.html" %}

{% block content %}

<div class="card">

<h2>Facturas Emitidas</h2>

<table class="tabla-facturas">

<thead>
<tr>
<th>NCF</th>
<th>Cliente</th>
<th>RNC</th>
<th>Fecha</th>
<th>Total</th>
<th>Acciones</th>
</tr>
</thead>

<tbody>

{% for factura in facturas %}

<tr>
<td>{{ factura[1] }}</td>
<td>{{ factura[2] }}</td>
<td>{{ factura[3] }}</td>
<td>{{ factura[4] }}</td>
<td>RD$ {{ factura[5] }}</td>

<td>

<a class="btn-primary" href="/descargar_factura/{{ factura[0] }}">
Descargar
</a>

<a class="btn-danger" href="/eliminar_factura/{{ factura[0] }}">
Eliminar
</a>

</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
