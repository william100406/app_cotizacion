{% extends "base.html" %}

{% block content %}
<div class="perfil-wrap">
  <div class="perfil-card">
    <div class="perfil-header">
      <div class="avatar-box">
        <img
          id="preview"
          src="{{ url_for('static', filename='uploads/' + (user.foto if user.foto else 'default.png')) }}"
          alt="Foto de perfil"
          class="avatar-img"
        >

        <label for="foto" class="avatar-edit" title="Cambiar foto">
          <i class="bi bi-camera-fill"></i>
        </label>
      </div>

      <div class="perfil-title">
        <h2>Perfil de Usuario</h2>
        <p>Gestiona tu cuenta, la foto de perfil y los datos de la empresa.</p>
      </div>
    </div>

    <form method="POST" enctype="multipart/form-data" id="perfilForm" class="perfil-form">
      <input
        type="file"
        id="foto"
        name="foto"
        accept="image/*"
        class="d-none"
        onchange="previewImage(event)"
      >

      <div class="section">
        <h3>Foto de perfil</h3>
        <p class="section-subtitle">Haz clic sobre la cámara para cambiar la imagen.</p>
      </div>

      <div class="grid-2">
        <div class="field">
          <label>Usuario</label>
          <input type="text" name="usuario" value="{{ user.usuario }}" required>
        </div>

        <div class="field">
          <label>Nombre de la empresa</label>
          <input type="text" name="empresa" value="{{ empresa.nombre }}" required>
        </div>
      </div>

      <div class="grid-2">
        <div class="field">
          <label>Nueva contraseña</label>
          <div class="password-box">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Dejar vacío si no deseas cambiarla"
              oninput="toggleIcon(this, 'icon-password')"
            >
            <i class="bi bi-eye password-icon" id="icon-password" onclick="togglePassword('password', this)"></i>
          </div>
        </div>

        <div class="field">
          <label>Confirmar contraseña</label>
          <div class="password-box">
            <input
              type="password"
              id="confirmar"
              name="confirmar"
              placeholder="Repite la nueva contraseña"
              oninput="toggleIcon(this, 'icon-confirmar')"
            >
            <i class="bi bi-eye password-icon" id="icon-confirmar" onclick="togglePassword('confirmar', this)"></i>
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="section">
        <h3>Datos de la empresa</h3>
        <p class="section-subtitle">Estos datos aparecerán en tus facturas y cotizaciones.</p>
      </div>

      <div class="grid-2">
        <div class="field">
          <label>RNC</label>
          <input type="text" name="rnc" value="{{ empresa.rnc }}" placeholder="Ej: 132-12345-6">
        </div>

        <div class="field">
          <label>Teléfono</label>
          <input
            type="tel"
            name="telefono"
            value="{{ empresa.telefono }}"
            placeholder="+1 (809) 123-4567"
            inputmode="numeric"
            oninput="this.value = this.value.replace(/[^0-9+\-\s()]/g, '')"
          >
        </div>
      </div>

      <div class="grid-2">
        <div class="field">
          <label>Correo</label>
          <input type="email" name="correo" value="{{ empresa.correo }}" placeholder="Ej: contacto@empresa.com" required>
        </div>

        <div class="field">
          <label>Dirección</label>
          <textarea name="direccion" rows="4" placeholder="Ej: Santo Domingo, República Dominicana">{{ empresa.direccion }}</textarea>
        </div>
      </div>

      <div class="actions">
        <button type="submit" class="btn-save">
          <i class="bi bi-save"></i>
          Guardar cambios
        </button>

        <a href="{{ url_for('index') }}" class="btn-cancel">
          Cancelar
        </a>
      </div>
    </form>
  </div>
</div>

<style>
  .perfil-wrap{
    min-height: calc(100vh - 80px);
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding: 32px 16px;
  }

  .perfil-card{
    width:100%;
    max-width: 900px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    box-shadow: 0 18px 50px rgba(0,0,0,0.35);
    backdrop-filter: blur(14px);
    padding: 28px;
    color: var(--text);
}

  .perfil-header{
    display:flex;
    gap: 24px;
    align-items:center;
    margin-bottom: 26px;
    flex-wrap: wrap;
  }

  .avatar-box{
    position: relative;
    width: 130px;
    height: 130px;
    flex: 0 0 130px;
  }

  .avatar-img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius: 50%;
    border: 4px solid rgba(96,165,250,0.9);
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    background:#0f172a;
  }

  .avatar-edit{
    position:absolute;
    right: 4px;
    bottom: 4px;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display:flex;
    align-items:center;
    justify-content:center;
    background: linear-gradient(135deg, #2563eb, #7c3aed);
    color: white;
    cursor:pointer;
    border: 2px solid rgba(255,255,255,0.9);
    box-shadow: 0 8px 20px rgba(0,0,0,0.35);
  }

  .perfil-title h2{
  color: var(--text);
}

  .perfil-title p{
    margin: 8px 0 0;
    color: #94a3b8;;
  }

  .perfil-form{
    display:flex;
    flex-direction:column;
    gap: 18px;
  }

  .section h3{
  color: var(--text);
}

  .section-subtitle{
    margin: 6px 0 0;
    color:#94a3b8;
    font-size: .95rem;
  }

  .grid-2{
    display:grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 18px;
  }

  .field{
    display:flex;
    flex-direction:column;
    gap: 8px;
  }

  .field label{
  color: var(--text);
  }

  .field input,
  .field textarea{
    width:100%;
    border: 1px solid rgba(148,163,184,0.25);
    border-radius: 14px;
    background: rgba(15,23,42,0.75);
    color: #fff;
    padding: 12px 14px;
    outline: none;
    transition: .2s ease;
  }

  .field input::placeholder,
  .field textarea::placeholder{
    color: #94a3b8;
  }

  .field input:focus,
  .field textarea:focus{
    border-color: #60a5fa;
    box-shadow: 0 0 0 4px rgba(59,130,246,0.18);
  }

  .password-box{
    position: relative;
  }

  .password-box input{
    padding-right: 46px;
  }

  .password-icon{
    position:absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: #cbd5e1;
    cursor:pointer;
    font-size: 18px;
    display:none;
  }

  .divider{
    height:1px;
    background: rgba(255,255,255,0.10);
    margin: 6px 0;
  }

  .actions{
    display:flex;
    gap: 12px;
    margin-top: 8px;
  }

  .btn-save,
  .btn-cancel{
    flex:1;
    border-radius: 14px;
    padding: 12px 16px;
    font-weight: 700;
    text-decoration:none;
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 8px;
    transition: .2s ease;
  }

  .btn-save{
    border: none;
    background: linear-gradient(135deg, #2563eb, #7c3aed);
    color:#fff;
  }

  .btn-cancel{
  border: 1px solid #cbd5e1;
  color: #1e293b;
  background: #f1f5f9;
}

.btn-cancel:hover{
  background: #e2e8f0;
}

  .btn-save:hover,
  .btn-cancel:hover,
  .avatar-edit:hover{
    transform: translateY(-1px);
    opacity: .95;
  }

  @media (max-width: 768px){
    .perfil-card{
      padding: 20px;
    }

    .grid-2{
      grid-template-columns: 1fr;
    }

    .actions{
      flex-direction: column;
    }

    .perfil-title h2{
      font-size: 1.5rem;
    }
  }

body.tema-claro .perfil-title h2,
body.tema-claro .section h3,
body.tema-claro .field label {
  color: #1e293b;
}

:root {
  --card: #ffffff;
  --text: #1e293b;
  --border: #e2e8f0;
  --input-bg: #f1f5f9;
}

.tema-claro {
  --card: #ffffff;
  --text: #1e293b;
  --border: #e2e8f0;
  --input-bg: #f1f5f9;
}

.tema-oscuro {
  --card: rgba(255,255,255,0.06);
  --text: #e5e7eb;
  --border: rgba(255,255,255,0.10);
  --input-bg: rgba(15,23,42,0.75);
}

input, textarea {
  background: var(--input-bg);
  color: var(--text);
  border: 1px solid var(--border);
}
</style>

<script>
function togglePassword(id, icon) {
  const input = document.getElementById(id);
  if (input.type === "password") {
    input.type = "text";
    icon.classList.remove("bi-eye");
    icon.classList.add("bi-eye-slash");
  } else {
    input.type = "password";
    icon.classList.remove("bi-eye-slash");
    icon.classList.add("bi-eye");
  }
}

function toggleIcon(input, iconId) {
  const icon = document.getElementById(iconId);
  icon.style.display = input.value.length > 0 ? "block" : "none";
}

function previewImage(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function () {
    document.getElementById("preview").src = reader.result;
  };
  reader.readAsDataURL(file);
}

document.querySelector("#perfilForm").addEventListener("submit", function(e) {
  const usuario = document.querySelector("[name='usuario']").value.trim();
  const empresa = document.querySelector("[name='empresa']").value.trim();
  const password = document.getElementById("password").value.trim();
  const confirmar = document.getElementById("confirmar").value.trim();

  if (!usuario && !empresa && !password) {
    alert("Debes modificar al menos un campo");
    e.preventDefault();
    return;
  }

  if (password || confirmar) {
    if (password !== confirmar) {
      alert("Las contraseñas no coinciden");
      e.preventDefault();
      return;
    }

    if (password.length > 0 && password.length < 4) {
      alert("La contraseña debe tener al menos 4 caracteres");
      e.preventDefault();
    }
  }
});

window.onload = function(){
  let tema = localStorage.getItem("tema") || "auto";
  cambiarTema(tema);
}
</script>
{% endblock %}
