
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FactuCloud</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="icon" href="/static/FC.ico">
</head>
    {% extends "base.html" %}

{% block content %}

<div class="container mt-5">
  <div class="card shadow-lg border-0 rounded-4 p-4" style="max-width:700px; margin:auto;">

    <div class="text-center mb-4">
         <label class="form-label fw-semibold">Foto de Perfil</label><br>

  <img id="preview"
       src="{{ url_for('static', filename='uploads/' + (user.foto if user.foto else 'default.png')) }}"
       class="rounded-circle mb-3"
       style="width:100px; height:100px; object-fit:cover; border:3px solid #0d6efd;">

  <input type="file" name="foto" class="form-control"
         onchange="previewImage(event)">
      <h3 class="fw-bold">Perfil de Usuario</h3>
      <p class="text-muted">Gestiona tu cuenta y datos del sistema</p>
    </div>

    <form method="POST" enctype="multipart/form-data">

      <div class="mb-3">
  <label class="form-label fw-semibold">Usuario</label>
  <input type="text" name="usuario" class="form-control rounded-3"
         value="{{ user.usuario }}"
         placeholder="Ej: admin o usuario123" required>
</div>

      <div class="mb-3 position-relative">
  <label class="form-label fw-semibold">Nueva Contraseña</label>

  <input type="password" id="password" name="password"
       class="form-control rounded-3 pe-5"
       placeholder="Dejar vacío si no deseas cambiarla"
       oninput="toggleIcon(this, 'icon-password')">

  <i class="bi bi-eye position-absolute"
   id="icon-password"
   onclick="togglePassword('password', this)"
   style="right:15px; top:38px; cursor:pointer; font-size:18px; display:none;"></i>
</div>

      <div class="mb-3 position-relative">
  <label class="form-label fw-semibold">Confirmar Contraseña</label>

  <input type="password" id="confirmar" name="confirmar"
       class="form-control rounded-3 pe-5"
       placeholder="Repite la nueva contraseña"
       oninput="toggleIcon(this, 'icon-confirmar')">

  <i class="bi bi-eye position-absolute"
   id="icon-confirmar"
    onclick="togglePassword('confirmar', this)"
   style="right:15px; top:38px; cursor:pointer; font-size:18px; display:none;"></i>
</div>

      <hr>

      <h5 class="mb-3">Datos de la Empresa</h5>

      <div class="mb-3">
  <label class="form-label">Nombre de Empresa</label>
  <input type="text" name="empresa" class="form-control"
         value="{{ empresa.nombre }}"
         placeholder="Ej: FactuCloud SRL" required>
</div>

      <div class="mb-3">
  <label class="form-label">RNC</label>
  <input type="text" name="rnc" class="form-control"
         value="{{ empresa.rnc }}"
         placeholder="Ej: 132-12345-6">
</div>

      <div class="mb-3">
        <label class="form-label">Telefono</label>
        <input type="tel"
       name="telefono"
       class="form-control"
       placeholder="+1 (809) 123-4567"
       inputmode="numeric"
       oninput="this.value = this.value.replace(/[^0-9+\-\s()]/g, '')">
      </div>

      <div class="mb-3">
  <label class="form-label">Correo</label>
  <input type="email" name="correo" class="form-control"
         value="{{ empresa.correo }}"
         placeholder="Ej: contacto@empresa.com" required>
</div>

      <div class="mb-3">
  <label class="form-label">Dirección</label>
  <textarea name="direccion" class="form-control"
            placeholder="Ej: Santo Domingo, República Dominicana">{{ empresa.direccion }}</textarea>
</div>

      <div class="d-flex gap-2 mt-4">
        <button class="btn btn-primary w-100 rounded-3">
  <i class="bi bi-save me-2"></i> Guardar Cambios
</button>
        <a href="{{ url_for('index') }}" class="btn btn-outline-secondary w-100 rounded-3">
          Cancelar
        </a>
      </div>

    </form>

  </div>
</div>

{% endblock %}

<style>
    .btn:hover {
  transform: scale(1.02);
  transition: 0.2s;
}

.bi-eye, .bi-eye-slash {
  transition: opacity 0.2s ease;
}

#preview{
  transition: 0.3s ease;
}

#preview:hover{
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(13,110,253,0.5);
}
</style>

<script>
function togglePassword(id, icon) {
  const input = document.getElementById(id);

  if (input.type === "password") {
    input.type = "text";
    icon.classList.remove("bi-eye");
    icon.classList.add("bi-eye-slash");
  } else {
    input.type = "password";
    icon.classList.remove("bi-eye-slash");
    icon.classList.add("bi-eye");
  }
}

function toggleIcon(input, iconId) {
  const icon = document.getElementById(iconId);

  if (input.value.length > 0) {
    icon.style.display = "block";
  } else {
    icon.style.display = "none";
  }
}
</script>
<script>
document.querySelector("form").addEventListener("submit", function(e) {

  let usuario = document.querySelector("[name='usuario']").value.trim();
  let empresa = document.querySelector("[name='empresa']").value.trim();
  let password = document.getElementById("password").value;
  let confirmar = document.getElementById("confirmar").value;

  if (!usuario && !empresa && !password) {
    alert("Debes modificar al menos un campo");
    e.preventDefault();
    return;
  }

  if (password || confirmar) {
    if (password !== confirmar) {
      alert("Las contraseñas no coinciden");
      e.preventDefault();
      return;
    }

    if (password.length < 4) {
      alert("La contraseña debe tener al menos 4 caracteres");
      e.preventDefault();
      return;
    }
  }

});
</script>
<script>
function previewImage(event){
  const reader = new FileReader();

  reader.onload = function(){
    const output = document.getElementById('preview');
    output.src = reader.result;
  }

  reader.readAsDataURL(event.target.files[0]);
}
</script>
