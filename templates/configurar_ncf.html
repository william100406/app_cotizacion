{% extends "base.html" %}

{% block content %}

<div class="container">
  <div class="page-header">
    <div>
      <a href="{{ url_for('index') }}" class="back-btn">
        <i class="bi bi-arrow-left"></i>
        Volver al dashboard
      </a>
      <h1 class="page-title">Configurar NCF</h1>
      <div class="page-subtitle">Define el rango disponible para la facturacion fiscal.</div>
    </div>
  </div>

  <div class="form-card p-4">
    <form method="POST">
      <div class="row">
        <div class="col-md-4 mb-3">
          <label>Tipo de NCF</label>
          <input type="text" name="tipo" required>
        </div>

        <div class="col-md-4 mb-3">
          <label>Desde</label>
          <input type="number" name="desde" required>
        </div>

        <div class="col-md-4 mb-3">
          <label>Hasta</label>
          <input type="number" name="hasta" required>
        </div>
      </div>

      <button type="submit">
        <i class="fa fa-save"></i>
        Guardar configuracion
      </button>
    </form>
  </div>
</div>

{% endblock %}
