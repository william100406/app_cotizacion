<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>FactuCloud</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
:root {
    --bg-dark: #141429;
    --bg-darker: #0f1020;
    --card: rgba(20, 20, 41, 0.78);
    --card-border: rgba(255, 255, 255, 0.10);
    --text: #f3f4f6;
    --muted: #a1a1aa;
    --gray-soft: #2a2b3f;
    --gray-line: #3a3b52;
    --primary: #0d6efd;
    --primary-2: #4f8cff;
    --primary-glow: rgba(13, 110, 253, 0.28);
    --shadow: 0 24px 60px rgba(0, 0, 0, 0.38);
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family: Inter, system-ui, sans-serif;
}

body{
    min-height:100vh;
    display:grid;
    place-items:center;
    color:var(--text);
    background:
        radial-gradient(circle at top left, rgba(13, 110, 253, 0.20), transparent 28%),
        radial-gradient(circle at bottom right, rgba(255, 255, 255, 0.08), transparent 22%),
        linear-gradient(135deg, var(--bg-dark), var(--bg-darker));
}

.contenedor{
    width:100%;
    max-width:420px;
    padding:36px;
    border-radius:28px;
    background: linear-gradient(180deg, rgba(20, 20, 41, 0.88), rgba(20, 20, 41, 0.74));
    border:1px solid var(--card-border);
    box-shadow:var(--shadow);
    backdrop-filter: blur(14px);
}

h1{
    text-align:center;
    margin-bottom:12px;
    font-size:1.9rem;
    color:#fff;
}

p{
    text-align:center;
    color:var(--muted);
    margin-bottom:24px;
    font-size:0.95rem;
}

label{
    font-size:0.9rem;
    color:var(--text);
    display:block;
    margin-bottom:6px;
}

.input-wrap{
    position:relative;
}

.icon{
    position:absolute;
    left:12px;
    top:50%;
    transform:translateY(-50%);
    color:#b5b7c7;
    font-size:0.95rem;
}

input{
    width:100%;
    padding:12px 12px 12px 38px;
    margin-bottom:16px;
    border-radius:12px;
    border:1px solid var(--gray-line);
    background:rgba(255,255,255,0.045);
    color:#fff;
    outline:none;
    transition:0.25s ease;
}

input::placeholder{
    color:#9ca3af;
}

input:focus{
    border-color:var(--primary);
    box-shadow:0 0 0 4px var(--primary-glow);
    background:rgba(255,255,255,0.065);
}

.botones{
    display:flex;
    gap:12px;
    margin-top:8px;
}

button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:700;
    transition:0.2s ease;
}

.guardar{
    background:linear-gradient(135deg, var(--primary), var(--primary-2));
    color:#fff;
    box-shadow:0 12px 30px rgba(13, 110, 253, 0.24);
}

.cancelar{
    background:rgba(255,255,255,0.06);
    color:#fff;
    border:1px solid var(--gray-line);
}

button:hover{
    transform:translateY(-1px);
    opacity:0.95;
}

a{
    flex:1;
}
</style>
</head>

<body>

<div class="contenedor">

<h1>Configuración</h1>
<p>Actualiza tu usuario y contraseña</p>

<form method="POST">

<label>Usuario</label>
<div class="input-wrap">
<span class="icon"><i class="bi bi-person"></i></span>
<input type="text" name="usuario" value="{{ usuario }}">
</div>

<label>Contraseña</label>
<div class="input-wrap">
<span class="icon"><i class="bi bi-lock"></i></span>
<input type="password" name="password" value="{{ password }}">
</div>

<div class="botones">
    <button type="submit" class="guardar">Guardar</button>
    <a href="/" style="flex:1; text-decoration:none;">
        <button type="button" class="cancelar" style="width:100%;">Cancelar</button>
    </a>
</div>

</form>

</div>

</body>
</html>
