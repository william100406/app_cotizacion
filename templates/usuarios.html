<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Configuración de Usuario</title>

<style>

body{
    background-color:#dbd7d7;
    font-family: Arial, Helvetica, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.contenedor{
    background:#ffffff;
    padding:40px;
    border-radius:10px;
    box-shadow:0px 4px 15px rgba(0, 4, 15, 0.1);
    width:350px;
}

h1{
    text-align:center;
    margin-bottom:25px;
}

label{
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid #BBB9AC;
    border-radius:6px;
}

.botones{
    display:flex;
    justify-content:space-between;
}

button{
    padding:10px 18px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.guardar{
    background:#141429;
    color: white;
}

.guardar:hover{
    opacity:0.8;
}

.cancelar{
   background-color: #141429;
   color: white;
   border: none;
   border-radius: 6px;
   
}

.cancelar:hover{
    opacity:0.8;
}

</style>
</head>

<body>

<div class="contenedor">

<h1>Configuración de Usuario</h1>

<form method="POST">

<label>Usuario</label>
<input type="text" name="usuario" value="{{ usuario }}">

<label>Contraseña</label>
<input type="password" name="password" value="{{ password }}">

<div class="botones">
<button type="submit" class="guardar">Guardar Cambios</button>
<a href="/" class="cancelar"><button type="button">Cancelar</button></a>
</div>

</form>

</div>

</body>
</html>
