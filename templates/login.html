<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Login</title>

<link rel="icon" href="{{ url_for('static', filename='FC.ico') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
  --bg-dark: #141429;
  --bg-darker: #0f1020;
  --card: rgba(20, 20, 41, 0.78);
  --card-border: rgba(255, 255, 255, 0.10);
  --text: #f3f4f6;
  --muted: #a1a1aa;
  --gray-soft: #2a2b3f;
  --gray-line: #3a3b52;
  --primary: #0d6efd;
  --primary-2: #4f8cff;
  --primary-glow: rgba(13, 110, 253, 0.28);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: Inter, system-ui, sans-serif;
}

body {
  min-height: 100vh;
  display: grid;
  place-items: center;
  color: var(--text);
  background:
    radial-gradient(circle at top left, rgba(13, 110, 253, 0.22), transparent 28%),
    radial-gradient(circle at bottom right, rgba(255, 255, 255, 0.08), transparent 22%),
    linear-gradient(135deg, var(--bg-dark), var(--bg-darker));
}

.login-wrapper {
  width: 100%;
  max-width: 390px;
  padding: 16px;
}

.login-card {
  padding: 34px 30px;
  border-radius: 26px;
  background: linear-gradient(180deg, rgba(20, 20, 41, 0.88), rgba(20, 20, 41, 0.72));
  border: 1px solid var(--card-border);
  backdrop-filter: blur(14px);
  box-shadow:
    0 20px 60px rgba(0, 0, 0, 0.35),
    inset 0 1px 0 rgba(255, 255, 255, 0.04);
}

h2 {
  text-align: center;
  margin-bottom: 22px;
  font-size: 1.9rem;
  font-weight: 800;
  letter-spacing: 0.2px;
  color: #ffffff;
}

.alert {
  padding: 11px 12px;
  border-radius: 10px;
  margin-bottom: 12px;
  font-size: 0.92rem;
  border: 1px solid rgba(255, 255, 255, 0.08);
  background: rgba(255, 255, 255, 0.05);
}

.input-group {
  position: relative;
  margin-bottom: 15px;
}

.input-group i {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: #b5b7c7;
}

input {
  width: 100%;
  padding: 12px 12px 12px 40px;
  border-radius: 12px;
  border: 1px solid var(--gray-line);
  background: rgba(255, 255, 255, 0.045);
  color: #ffffff;
  transition: 0.25s ease;
}

input::placeholder {
  color: #9ca3af;
}

input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 4px var(--primary-glow);
  background: rgba(255, 255, 255, 0.065);
}

label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.92rem;
  color: var(--muted);
  margin-bottom: 12px;
  user-select: none;
}

input[type="checkbox"] {
  width: auto;
  accent-color: var(--primary);
}

.login-btn {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 12px;
  font-weight: 700;
  color: #fff;
  background: linear-gradient(135deg, var(--primary), var(--primary-2));
  cursor: pointer;
  margin-top: 10px;
  box-shadow: 0 12px 30px rgba(13, 110, 253, 0.28);
  transition: transform 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease;
}

.login-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 16px 34px rgba(13, 110, 253, 0.34);
}

.login-btn:active {
  transform: translateY(0);
}

.divider {
  text-align: center;
  margin: 22px 0 16px;
  color: var(--muted);
  font-size: 0.86rem;
  position: relative;
}

.divider::before,
.divider::after {
  content: "";
  position: absolute;
  top: 50%;
  width: 28%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
}

.divider::before { left: 0; }
.divider::after { right: 0; }

.social-login {
  display: flex;
  justify-content: center;
  gap: 10px;
}

.social-login button {
  width: 46px;
  height: 46px;
  border-radius: 12px;
  border: 1px solid var(--gray-line);
  background: rgba(255, 255, 255, 0.05);
  color: #ffffff;
  cursor: pointer;
  font-size: 18px;
  transition: 0.2s ease;
}

.social-login button:hover {
  background: rgba(13, 110, 253, 0.14);
  border-color: rgba(13, 110, 253, 0.35);
  transform: translateY(-1px);
}

.google:hover { color: #fff; }
.gmail:hover { color: #fff; }
.github:hover { color: #fff; }
</style>
</head>

<body>

<div class="login-wrapper">

<div class="login-card">

<h2>Iniciar Sesión</h2>
 
{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="alert {{ category }}">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}

<form method="POST">

<div class="input-group">
<i class="fa fa-user"></i>
<input type="text" name="usuario" placeholder="Usuario" required>
</div>

<div class="input-group">
<i class="fa fa-lock"></i>
<input type="password" id="password" name="password" placeholder="Contraseña" required>
</div>

<label>
<input type="checkbox" name="recordar">
Recordar sesión
</label>

<div class="forgot-password">
<a href="/recuperar">¿Olvidaste tu contraseña?</a>
</div>

<button type="submit" class="login-btn">Entrar</button>

</form>

<div class="divider">
<span>o iniciar sesión con</span>
</div>

<div class="social-login">
<button class="google"><i class="fab fa-google"></i></button>
<button class="gmail"><i class="fas fa-envelope"></i></button>
<button class="github"><i class="fab fa-github"></i></button>
</div>

</div>

</div>

<script>
function togglePassword() {
const password = document.getElementById("password");
password.type = password.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
