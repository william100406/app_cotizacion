<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
width:300px;
}

input{
width:100%;
padding:10px;
margin-bottom:15px;
}

button{
width:100%;
padding:10px;
background:#2c3e50;
color:white;
border:none;
}

</style>

</head>

<body>

<div class="login">

<h2>Login</h2>

<form method="POST">

<input type="text" name="usuario" placeholder="Usuario">

<input type="password" name="password" placeholder="Contraseña">

<button>Entrar</button>

</form>

</div>

</body>
</html>
