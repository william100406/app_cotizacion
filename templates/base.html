<!DOCTYPE html>
<html lang="es">
<head>
<link rel="manifest" href="/static/manifest.json">
<link rel="icon" href="/static/FC.ico">
<meta name="theme-color" content="#1e1e2f">
<meta charset="UTF-8">
<title>FactuCloud</title>
<meta name="viewport" content="width=device-width, initial-scale=1">


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background-color:#f4f6f9;
}



.sidebar{
position:fixed;
left: 0;
top: 0;
width: 250px;
height:100vh;
background-color:#1e293b;
color:white;
padding:20px;
}

.sidebar h4{
margin-bottom:20px;
}


.sidebar a{
color:white;
text-decoration:none;
display:block;
width:100%;
margin-bottom:6px;
padding:10px 14px;
border-radius:8px;
transition:0.2s;
}


.sidebar a:hover{
background:rgba(255,255,255,0.10);
color:white;
}


.submenu{
display:none;
list-style:none;
padding-left:10px;
margin-top:5px;
}

.submenu li a{
font-size:14px;
padding:8px 12px;
border-radius:6px;
}


.content{
margin-left: 250px;
padding:30px;
width: calc(100% - 250px);
}

.card{
border-radius:12px;
}


body.tema-claro{
background:#f4f6f9;
color:#000;
}

body.tema-oscuro{
background:#141429;
color:white;
}

body.tema-oscuro .content{
background:#1e1e2f;
}

body.tema-oscuro .sidebar{
background:#0f172a;
}

body.tema-oscuro .content{
    background: #141429;
}

body.tema-oscuro .card{
    background: #1e1e2f !important;
    color: #ffffff !important;
    border: 1px solid rgba(255,255,255,0.05);
}

body.tema-oscuro .form-card{
    background: #1e1e2f;
    color: #fff;
}

body.tema-oscuro table{
    background: #1e1e2f;
    color: #fff;
}

body.tema-oscuro th{
    background: #0f172a;
    color: #fff;
}

body.tema-oscuro td{
    background: transparent;
    color: #e5e7eb;
    border-color: rgba(255,255,255,0.1);
}

body.tema-oscuro input,
body.tema-oscuro select{
    background: #0f172a;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
}

body.tema-oscuro button{
    background: #4f46e5;
    color: white;
    border: none;
}

body.tema-oscuro button:hover{
    background: #6366f1;
}

body.tema-oscuro h1,
body.tema-oscuro h2,
body.tema-oscuro h3,
body.tema-oscuro h4,
body.tema-oscuro p,
body.tema-oscuro label{
    color: #ffffff;
}

body.tema-oscuro ::placeholder{
    color: #9ca3af;
}

</style>
</head>

<body>

<div class="container-fluid">
<div class="row">

<div class="sidebar">

<div class="logo">
<h4>FactuCloud</h4>
</div>

<hr>

<a href="/">Dashboard</a>
<a href="/nueva">Nueva Cotización</a>
<a href="/configurar_ncf">Configurar NCF</a>
<a href="/facturas">Facturas</a>
<a href="/clientes">Clientes</a>

<a href="javascript:void(0)" onclick="toggleMenu()">⚙ Configuración <span id="arrow">▸</span></a>

<ul id="submenu-config" class="submenu">

<li><a href="/usuarios">Usuarios</a></li>

<li>
Tema:
<select onchange="cambiarTema(this.value)">
<option value="auto">Sistema</option>
<option value="claro">Claro</option>
<option value="oscuro">Oscuro</option>
</select>
</li>

<li><a href="/logout">Cerrar sesión</a></li>

</ul>

</div>


<div class="content">
{% block content %}{% endblock %}
</div>

</div>
</div>

<script>

function toggleMenu(){

let menu=document.getElementById("submenu-config")
let arrow=document.getElementById("arrow")

if(menu.style.display==="none" || menu.style.display===""){
menu.style.display="block"
arrow.innerHTML="▾"
}else{
menu.style.display="none"
arrow.innerHTML="▸"
}

}

</script>

<script>

function cambiarTema(tema){

localStorage.setItem("tema",tema)

if(tema==="claro"){
document.body.classList.remove("tema-oscuro")
document.body.classList.add("tema-claro")
}

if(tema==="oscuro"){
document.body.classList.remove("tema-claro")
document.body.classList.add("tema-oscuro")
}

if(tema==="auto"){
document.body.classList.remove("tema-claro")
document.body.classList.remove("tema-oscuro")
}

}

window.onload=function(){

let temaGuardado=localStorage.getItem("tema")

if(temaGuardado){
cambiarTema(temaGuardado)
}

}

</script>

</body>
</html>
