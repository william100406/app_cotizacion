<!DOCTYPE html>
<html lang="es">
<head>
<link rel="manifest" href="/static/manifest.json">
<link rel="icon" href="/static/FC.ico">
<meta name="theme-color" content="#1e1e2f">
<meta charset="UTF-8">
<title>FactuCloud</title>
<meta name="viewport" content="width=device-width, initial-scale=1">


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
background-color:#f4f6f9;
}



.sidebar{
position:fixed;
left: 0;
top: 0;
width: 250px;
height:100vh;
background-color:#1e293b;
color:white;
padding:20px;
}

.sidebar h4{
margin-bottom:20px;
}


.sidebar a{
color:white;
text-decoration:none;
display:flex;
align-items:center;
gap:10px;
width:100%;
margin-bottom:6px;
padding:10px 14px;
border-radius:8px;
transition:0.25s ease;
}

.sidebar a i{
width:18px;
text-align:center;
opacity:0.9;
}

.sidebar a:hover{
background:rgba(255,255,255,0.10);
color:white;
transform:translateX(6px);
} 

.submenu{
display:none;
list-style:none;
margin-top:8px;
padding:10px;
border-radius:12px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.05);
animation:fadeIn 0.3s ease;
}

.submenu li{
margin-bottom:8px;
}

.submenu li:last-child{
margin-bottom:0;
}

.submenu a{
display:flex;
align-items:center;
gap:8px;
padding:8px 10px;
border-radius:8px;
font-size:14px;
transition:0.2s;
}

.submenu a:hover{
background:rgba(255,255,255,0.08);
transform:translateX(4px);
}

.tema-box{
display:flex;
flex-direction:column;
gap:5px;
font-size:13px;
color:#cbd5e1;
}

.tema-box span{
display:flex;
align-items:center;
gap:6px;
}

.tema-box select{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
color:#fff;
border-radius:8px;
padding:6px;
font-size:13px;
}

.tema-box select:focus{
outline:none;
border-color:#f59e0b;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(-5px);
}
to{
opacity:1;
transform:translateY(0);
}
}


.content{
margin-left: 250px;
padding:30px;
width: calc(100% - 250px);
}

.card{
border-radius:12px;
}


body.tema-claro{
background:#f4f6f9;
color:#000;
}

body.tema-oscuro{
background:#141429;
color:white;
}

body.tema-oscuro .content{
background:#1e1e2f;
}

body.tema-oscuro .sidebar{
background:#0f172a;
}

body.tema-oscuro .content{
    background: #141429;
}

body.tema-oscuro .card{
    background: #1e1e2f !important;
    color: #ffffff !important;
    border: 1px solid rgba(255,255,255,0.05);
}

body.tema-oscuro .form-card{
    background: #1e1e2f;
    color: #fff;
}

body.tema-oscuro table{
    background: #1e1e2f;
    color: #fff;
}

body.tema-oscuro th{
    background: #0f172a;
    color: #fff;
}

body.tema-oscuro td{
    background: transparent;
    color: #e5e7eb;
    border-color: rgba(255,255,255,0.1);
}

body.tema-oscuro input,
body.tema-oscuro select{
    background: #0f172a;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
}

body.tema-oscuro button{
    background: #4f46e5;
    color: white;
    border: none;
}

body.tema-oscuro button:hover{
    background: #6366f1;
}

body.tema-oscuro h1,
body.tema-oscuro h2,
body.tema-oscuro h3,
body.tema-oscuro h4,
body.tema-oscuro p,
body.tema-oscuro label{
    color: #ffffff;
}

body.tema-oscuro ::placeholder{
    color: #9ca3af;
}

body.tema-claro .submenu{
    background:#ffffff;
    border:1px solid rgba(0,0,0,0.08);
}

body.tema-claro .submenu a{
    color:#1e293b;
}

body.tema-claro .submenu a:hover{
    background:rgba(0,0,0,0.05);
}

body.tema-claro .tema-box{
    color:#1e293b;
}

body.tema-claro .tema-box select{
    background:#ffffff;
    color:#1e293b;
    border:1px solid rgba(0,0,0,0.2);
}

body.tema-claro .sidebar{
    background:#ffffff;
    color:#1e293b;
}

body.tema-claro .sidebar a{
    color:#1e293b;
}

body.tema-claro .sidebar a:hover{
    background:rgba(0,0,0,0.05);
}

body.tema-claro .submenu{
    background:#ffffff;
    border:1px solid rgba(0,0,0,0.08);
}

body.tema-claro .submenu a{
    color:#1e293b;
}

body.tema-claro .submenu a:hover{
    background:rgba(0,0,0,0.05);
}

body.tema-claro .tema-box{
    color:#1e293b;
}

body.tema-claro .tema-box select{
    background:#ffffff;
    color:#1e293b;
    border:1px solid rgba(0,0,0,0.2);
}

body.tema-claro .sidebar{
    background:#ffffff !important;
    color:#1e293b !important;
}

body.tema-claro .sidebar h4{
    color:#0f172a;
}

body.tema-claro .sidebar a{
    color:#1e293b !important;
    font-weight:500;
    opacity:1;
}

body.tema-claro .sidebar a i{
    color:#1e293b !important;
    opacity:1;
}

body.tema-claro .sidebar a:hover{
    background:rgba(0,0,0,0.05);
    color:#000 !important;
}

body.tema-claro .submenu{
    background:#ffffff;
    border:1px solid rgba(0,0,0,0.1);
}

body.tema-claro .submenu a{
    color:#1e293b !important;
}

body.tema-claro .tema-box{
    color:#1e293b;
}

body.tema-claro select{
    background:#ffffff !important;
    color:#1e293b !important;
    border:1px solid rgba(0,0,0,0.2);
}

body.tema-claro button{
    opacity:1;
}

</style>
</head>

<body>

<div class="container-fluid">
<div class="row">

<div class="sidebar">

<div class="logo">
<h4>FactuCloud</h4>
</div>

<hr>

<a href="/"><i class="fa fa-chart-line"></i> Dashboard</a>
<a href="/nueva"><i class="fa fa-plus"></i> Nueva Cotización</a>
<a href="/configurar_ncf"><i class="fa fa-file-invoice"></i> Configurar NCF</a>
<a href="/facturas"><i class="fa fa-file"></i> Facturas</a>
<a href="/clientes"><i class="fa fa-users"></i> Clientes</a>

<a href="javascript:void(0)" onclick="toggleMenu()">
<i class="fa fa-gear"></i> Configuración <span id="arrow">▸</span>
</a>

<ul id="submenu-config" class="submenu">

<li><a href="/usuarios"><i class="fa fa-user"></i> Usuarios</a></li>

<li class="tema-box">
    <span><i class="fa fa-palette"></i> Tema</span>
    <select onchange="cambiarTema(this.value)">
        <option value="auto">Sistema</option>
        <option value="claro">Claro</option>
        <option value="oscuro">Oscuro</option>
    </select>
</li>

<li><a href="/logout"><i class="fa fa-right-from-bracket"></i> Cerrar sesión</a></li>

</ul>

</div>


<div class="content">
{% block content %}{% endblock %}
</div>

</div>
</div>

<script>

function toggleMenu(){

let menu=document.getElementById("submenu-config")
let arrow=document.getElementById("arrow")

if(menu.style.display==="none" || menu.style.display===""){
menu.style.display="block"
arrow.innerHTML="▾"
}else{
menu.style.display="none"
arrow.innerHTML="▸"
}

}

</script>

<script>

function cambiarTema(tema){

localStorage.setItem("tema",tema)

if(tema==="claro"){
document.body.classList.remove("tema-oscuro")
document.body.classList.add("tema-claro")
}

if(tema==="oscuro"){
document.body.classList.remove("tema-claro")
document.body.classList.add("tema-oscuro")
}

if(tema==="auto"){
if(window.matchMedia('(prefers-color-scheme: dark)').matches){
    document.body.classList.remove("tema-claro")
    document.body.classList.add("tema-oscuro")
}else{
    document.body.classList.remove("tema-oscuro")
    document.body.classList.add("tema-claro")
}
}

}

window.onload=function(){

let temaGuardado=localStorage.getItem("tema")

if(temaGuardado){
cambiarTema(temaGuardado)
}

}

</script>

</body>
</html>
