<!DOCTYPE html>
<html lang="es">
<head>
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<link rel="manifest" href="/static/manifest.json">
<link rel="icon" href="/static/FC.ico">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
<meta name="theme-color" content="#1e1e2f">
<meta charset="UTF-8">
<title>FactuCloud</title>
<meta name="viewport" content="width=device-width, initial-scale=1">


<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
background-color:#f4f6f9;
}



.sidebar{
position:fixed;
left: 0;
top: 0;
width: 250px;
height:100vh;
background-color:#1e293b;
color:white;
padding:20px;
}

.sidebar h4{
margin-bottom:20px;
}


.sidebar a{
color:white;
text-decoration:none;
display:flex;
align-items:center;
gap:10px;
width:100%;
margin-bottom:6px;
padding:10px 14px;
border-radius:8px;
transition:0.25s ease;
}

.sidebar a i{
width:18px;
text-align:center;
opacity:0.9;
}

.sidebar a:hover{
background:rgba(255,255,255,0.10);
color:white;
transform:translateX(6px);
} 

.submenu{
display:none;
list-style:none;
margin-top:8px;
padding:10px;
border-radius:12px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.05);
animation:fadeIn 0.3s ease;
}

.submenu li{
margin-bottom:8px;
}

.submenu li:last-child{
margin-bottom:0;
}

.submenu a{
display:flex;
align-items:center;
gap:8px;
padding:8px 10px;
border-radius:8px;
font-size:14px;
transition:0.2s;
}

.submenu a:hover{
background:rgba(255,255,255,0.08);
transform:translateX(4px);
}

.tema-box{
display:flex;
flex-direction:column;
gap:5px;
font-size:13px;
color:#cbd5e1;
}

.tema-box span{
display:flex;
align-items:center;
gap:6px;
}

.tema-box select{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
color:#fff;
border-radius:8px;
padding:6px;
font-size:13px;
}

.tema-box select:focus{
outline:none;
border-color:#f59e0b;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(-5px);
}
to{
opacity:1;
transform:translateY(0);
}
}


.content{
    margin-left: 250px;
    padding:30px;
    width: calc(100% - 250px);
    min-height: 100vh; /* 🔥 esto arregla el corte */
    background: transparent !important; /* 🔥 CLAVE */
}

.card{
border-radius:12px;
}


body.tema-claro{
background:#f4f6f9;
color:#000;
}

body.tema-oscuro{
    background:
        radial-gradient(circle at 20% 30%, rgba(79,140,255,0.25), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(13,110,253,0.18), transparent 40%),
        linear-gradient(135deg, #0f1020, #141429);
}

body.tema-oscuro .sidebar{
    background: rgba(15,23,42,0.6);
    backdrop-filter: blur(12px);
}

body.tema-oscuro .card{
    background: rgba(255,255,255,0.04) !important;
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.08);
    color: white !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}

body.tema-oscuro .form-card{
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(20px);
    color: #fff;
}

body.tema-oscuro table{
    background: transparent !important;
}

body.tema-oscuro thead{
    background: rgba(255,255,255,0.05) !important;
}

body.tema-oscuro tr:hover{
    background: rgba(255,255,255,0.05);
}

body.tema-oscuro th{
    background: #0f172a;
    color: #fff;
}

body.tema-oscuro td{
    background: transparent;
    color: #e5e7eb;
    border-color: rgba(255,255,255,0.1);
}

body.tema-oscuro input,
body.tema-oscuro select{
    background: #0f172a;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
}

body.tema-oscuro button{
    background: #4f46e5;
    color: white;
    border: none;
}

body.tema-oscuro .btn-danger{
    background:#e74c3c !important;
    color:white !important;
    border: none;
    border-radius: 8px;
}

body.tema-oscuro .btn-danger:hover{
    background:#c0392b !important;
    border: none;
    border-radius: 8px;
}

body.tema-oscuro button:hover{
    background: #6366f1;
}

body.tema-oscuro h1,
body.tema-oscuro h2,
body.tema-oscuro h3,
body.tema-oscuro h4,
body.tema-oscuro p,
body.tema-oscuro label{
    color: #ffffff;
}

body.tema-oscuro ::placeholder{
    color: #9ca3af;
}

body.tema-claro .submenu{
    background:#ffffff;
    border:1px solid rgba(0,0,0,0.08);
}

body.tema-claro .submenu a{
    color:#1e293b;
}

body.tema-claro .submenu a:hover{
    background:rgba(0,0,0,0.05);
}

body.tema-claro .tema-box{
    color:#1e293b;
}

body.tema-claro .tema-box select{
    background:#ffffff;
    color:#1e293b;
    border:1px solid rgba(0,0,0,0.2);
}

body.tema-claro .sidebar{
    background:#ffffff;
    color:#1e293b;
}

body.tema-claro .sidebar a{
    color:#1e293b;
}

body.tema-claro .sidebar a:hover{
    background:rgba(0,0,0,0.05);
}

body.tema-claro .submenu{
    background:#ffffff;
    border:1px solid rgba(0,0,0,0.08);
}

body.tema-claro .submenu a{
    color:#1e293b;
}

body.tema-claro .submenu a:hover{
    background:rgba(0,0,0,0.05);
}

body.tema-claro .tema-box{
    color:#1e293b;
}

body.tema-claro .tema-box select{
    background:#ffffff;
    color:#1e293b;
    border:1px solid rgba(0,0,0,0.2);
}

body.tema-claro .sidebar{
    background:#ffffff !important;
    color:#1e293b !important;
}

body.tema-claro .sidebar h4{
    color:#0f172a;
}

body.tema-claro .sidebar a{
    color:#1e293b !important;
    font-weight:500;
    opacity:1;
}

body.tema-claro .sidebar a i{
    color:#1e293b !important;
    opacity:1;
}

body.tema-claro .sidebar a:hover{
    background:rgba(0,0,0,0.05);
    color:#000 !important;
}

body.tema-claro .submenu{
    background:#ffffff;
    border:1px solid rgba(0,0,0,0.1);
}

body.tema-claro .submenu a{
    color:#1e293b !important;
}

body.tema-claro .tema-box{
    color:#1e293b;
}

body.tema-claro select{
    background:#ffffff !important;
    color:#1e293b !important;
    border:1px solid rgba(0,0,0,0.2);
}

body.tema-claro button{
    opacity:1;
}

.topbar{
display:flex;
justify-content:flex-end;
margin-bottom:20px;
}

.profile-dropdown{
position:relative;
}

.profile-btn{
display:flex;
align-items:center;
gap:8px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.1);
color:inherit;
padding:8px 12px;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

.profile-btn:hover{
background:rgba(255,255,255,0.15);
}

.profile-menu{
position:absolute;
top:110%;
right:0;
background:#1e1e2f;
border-radius:12px;
padding:8px;
min-width:200px;
display:none;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
z-index:1000;
}

.profile-menu a{
display:flex;
align-items:center;
gap:8px;
padding:10px;
border-radius:8px;
text-decoration:none;
color:#e5e7eb;
transition:0.2s;
}

.profile-menu a:hover{
background:rgba(255,255,255,0.1);
}

.profile-menu .logout{
color:#f87171;
}

.profile-menu .divider{
height:1px;
background:rgba(255,255,255,0.1);
margin:5px 0;
}

.profile-menu.show{
display:block;
}

body.tema-claro .profile-menu{
background:#ffffff;
color:#1e293b;
border:1px solid rgba(0,0,0,0.1);
}

body.tema-claro .profile-menu a{
color:#1e293b;
}

body.tema-claro .profile-menu a:hover{
background:rgba(0,0,0,0.05);
}

.profile-card{
border-radius:14px;
}

.profile-header .avatar{
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#4f46e5,#6366f1);
color:white;
font-size:22px;
}

.cuenta-item{
padding:10px;
border-radius:10px;
transition:0.2s;
}

.cuenta-item:hover{
background:rgba(255,255,255,0.05);
}

body.tema-oscuro .select2-container--default .select2-selection--single {
    background-color: #0f172a;
    border: 1px solid #334155;
    height: 38px;
    display: flex;
    align-items: center;
}

body.tema-oscuro .select2-container--default .select2-selection__rendered {
    color: white !important;
}

body.tema-oscuro .select2-container--default .select2-selection__arrow b {
    border-color: #fff transparent transparent transparent;
}

body.tema-oscuro .select2-dropdown {
    background-color: #0f172a;
    color: white;
    border: 1px solid #334155;
}

body.tema-oscuro .select2-results__option {
    color: white;
}

body.tema-oscuro .select2-results__option--highlighted {
    background-color: #2563eb !important;
    color: white;
}

body.tema-oscuro .select2-search__field {
    background-color: #020617 !important;
    color: white !important;
    border: 1px solid #334155 !important;
}

body.tema-claro .select2-container--default .select2-selection--single {
    background-color: #ffffff;
    border: 1px solid #ced4da;
    height: 38px;
    display: flex;
    align-items: center;
}

body.tema-claro .select2-container--default .select2-selection__rendered {
    color: #000 !important;
}

body.tema-claro .select2-container--default .select2-selection__arrow b {
    border-color: #000 transparent transparent transparent;
}

body.tema-claro .select2-dropdown {
    background-color: #ffffff;
    color: #000;
    border: 1px solid #ced4da;
}

body.tema-claro .select2-results__option {
    color: #000;
}

body.tema-claro .select2-results__option--highlighted {
    background-color: #0d6efd !important;
    color: #fff;
}

body.tema-claro .select2-search__field {
    background-color: #ffffff !important;
    color: #000 !important;
    border: 1px solid #ced4da !important;
}

.btn-primary{
    background: linear-gradient(135deg, #0d6efd, #4f8cff);
    border: none;
    color: white;
    font-weight: 600;
    padding: 10px 18px;
    border-radius: 12px;

    box-shadow: 0 0 15px rgba(79, 140, 255, 0.5);

    transition: all 0.3s ease;
}

.btn-primary:hover{
    transform: translateY(-2px);

    box-shadow: 
        0 0 20px rgba(79, 140, 255, 0.8),
        0 0 40px rgba(79, 140, 255, 0.5);
}

button,
.btn-primary{
    background: linear-gradient(135deg, #0d6efd, #4f8cff);
    border: none;
    color: white;
    font-weight: 600;
    padding: 10px 18px;
    border-radius: 12px;

    box-shadow: 0 0 15px rgba(79, 140, 255, 0.5);

    transition: all 0.3s ease;
}

.mobile-header{
    display:none;
}

.overlay{
    display:none;
}

@media (max-width: 768px){

    .sidebar{
        position: fixed;
        left: -260px;
        top: 0;
        width: 240px;
        height: 100%;
        z-index: 1000;
        transition: 0.3s ease;
    }

    .sidebar.active{
        left: 0;
    }

    .content{
        margin-left: 0;
        width: 100%;
        padding: 20px;
    }

    .mobile-header{
        display:flex;
        align-items:center;
        justify-content: space-between;
        padding: 14px 16px;
        background: rgba(15,23,42,0.8);
        backdrop-filter: blur(12px);
        position: sticky;
        top:0;
        z-index:1100;
    }

    .menu-toggle{
        background: none;
        border: none;
        color: white;
        font-size: 20px;
        cursor: pointer;
    }

    .mobile-title{
        font-weight: 700;
        font-size: 16px;
    }

    .overlay{
        display:none;
        position: fixed;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.5);
        top:0;
        left:0;
        z-index:900;
    }

    .overlay.active{
        display:block;
    }
}

@media (max-width:768px){
    input, select, textarea{
        font-size:16px;
    }

    button{
        width:100%;
    }
}
</style>
</head>

<body>

    <div class="mobile-header">
    <button class="menu-toggle" onclick="toggleSidebar()">
        <i class="fa fa-bars"></i>
    </button>
    <span class="mobile-title">FactuCloud</span>
</div>

<div class="overlay" onclick="toggleSidebar()"></div>

<div class="container-fluid">
<div class="row">

<div class="sidebar">

<div class="logo">
<h4>FactuCloud</h4>
</div>

<hr>

<a href="/"><i class="fa fa-chart-line"></i> Dashboard</a>
<a href="/nueva"><i class="fa fa-plus"></i> Nueva Cotización</a>
<a href="/configurar_ncf"><i class="fa fa-file-invoice"></i> Configurar NCF</a>
<a href="/facturas"><i class="fa fa-file"></i> Facturas</a>
<a href="/clientes"><i class="fa fa-users"></i> Clientes</a>

<a href="javascript:void(0)" onclick="toggleMenu()">
<i class="fa fa-gear"></i> Configuración <span id="arrow">▸</span>
</a>

<ul id="submenu-config" class="submenu">

<li class="tema-box">
    <span><i class="fa fa-palette"></i> Tema</span>
    <select onchange="cambiarTema(this.value)">
        <option value="auto">Sistema</option>
        <option value="claro">Claro</option>
        <option value="oscuro">Oscuro</option>
    </select>
</li>

</ul>

</div>


<div class="content">

  <div class="topbar">
    <div class="profile-dropdown">
      
      <button class="profile-btn" onclick="toggleProfileMenu(event)">
        <i class="fa fa-user-circle"></i>
        <span>{{ usuario if usuario else "Usuario" }}</span>
        <i class="fa fa-chevron-down"></i>
      </button>

      <div class="profile-menu" id="profileMenu">
        <a href="/usuarios"><i class="fa fa-user"></i> Usuarios</a>
        <a href="/perfil"><i class="fa fa-gear"></i> Editar Perfil</a>

        <div class="divider"></div>

        <a href="/logout" class="logout">
          <i class="fa fa-right-from-bracket"></i> Cerrar sesión
        </a>
      </div>

    </div>
  </div>

  {% block content %}{% endblock %}

</div>

</div>
</div>

<script>

function toggleMenu(){

let menu=document.getElementById("submenu-config")
let arrow=document.getElementById("arrow")

if(menu.style.display==="none" || menu.style.display===""){
menu.style.display="block"
arrow.innerHTML="▾"
}else{
menu.style.display="none"
arrow.innerHTML="▸"
}

}

</script>

<script>

function cambiarTema(tema){

localStorage.setItem("tema",tema)

if(tema==="claro"){
document.body.classList.remove("tema-oscuro")
document.body.classList.add("tema-claro")
}

if(tema==="oscuro"){
document.body.classList.remove("tema-claro")
document.body.classList.add("tema-oscuro")
}

if(tema==="auto"){
if(window.matchMedia('(prefers-color-scheme: dark)').matches){
    document.body.classList.remove("tema-claro")
    document.body.classList.add("tema-oscuro")
}else{
    document.body.classList.remove("tema-oscuro")
    document.body.classList.add("tema-claro")
}
}

}

window.onload=function(){

let temaGuardado=localStorage.getItem("tema")

if(temaGuardado){
cambiarTema(temaGuardado)
}

}

</script>

<script>
function toggleProfileMenu(e){
e.stopPropagation();
document.getElementById("profileMenu").classList.toggle("show");
}

document.addEventListener("click", function(){
document.getElementById("profileMenu").classList.remove("show");
});
</script>

<script>
function toggleSidebar(){
    document.querySelector(".sidebar").classList.toggle("active");
    document.querySelector(".overlay").classList.toggle("active");
}
</script>

</body>
</html>
