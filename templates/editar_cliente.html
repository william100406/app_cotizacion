{% extends "base.html" %}

{% block content %}

<div class="container">
  <div class="page-header">
    <div>
      <a href="{{ url_for('clientes') }}" class="back-btn">
        <i class="bi bi-arrow-left"></i>
        Volver a clientes
      </a>
      <h2 class="page-title">Editar cliente</h2>
      <div class="page-subtitle">Actualiza la informacion de contacto y facturacion.</div>
    </div>
  </div>

  <div class="card shadow p-4">
    <form method="POST">
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Nombre</label>
          <input type="text" name="nombre" class="form-control" value="{{ cliente['nombre'] }}" required>
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">RNC</label>
          <input type="text" name="rnc" class="form-control" value="{{ cliente['rnc'] }}">
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Telefono</label>
          <input type="tel" pattern="[0-9+\-\s()]+" name="telefono" class="form-control" value="{{ cliente['telefono'] }}">
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Correo</label>
          <input type="email" name="correo" class="form-control" value="{{ cliente['correo'] }}">
        </div>

        <div class="col-md-12 mb-3">
          <label class="form-label">Direccion</label>
          <input type="text" name="direccion" class="form-control" value="{{ cliente['direccion'] }}">
        </div>
      </div>

      <div class="d-flex gap-2 flex-wrap">
        <button class="btn btn-primary" type="submit">
          <i class="fa fa-save"></i>
          Guardar cambios
        </button>
        <a href="/clientes" class="btn btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
